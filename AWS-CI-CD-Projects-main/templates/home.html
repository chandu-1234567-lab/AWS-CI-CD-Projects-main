<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Exam Performance Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        legend {
            text-align: center;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-size: 14px;
            margin-bottom: 6px;
            display: block;
        }

        select, input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        select, input[type="number"] {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        input[type="submit"] {
            background: #ff7eb3;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s ease;
        }

        input[type="submit"]:hover {
            background: #ff4f91;
            transform: translateY(-2px);
        }

        .prediction-result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }

        @media(max-width: 500px) {
            .container {
                padding: 25px;
            }
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Student Exam Performance Indicator</h1>

    <form action="{{ url_for('predict_datapoint')}}" method="post">
        <legend>Predict Your Maths Score</legend>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option disabled selected value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Race or Ethnicity</label>
            <select name="ethnicity" required>
                <option disabled selected value="">Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parental Level of Education</label>
            <select name="parental_level_of_education" required>
                <option disabled selected value="">Select Parent Education</option>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master's Degree</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lunch Type</label>
            <select name="lunch" required>
                <option disabled selected value="">Select Lunch Type</option>
                <option value="free/reduced">Free/Reduced</option>
                <option value="standard">Standard</option>
            </select>
        </div>

        <div class="form-group">
            <label>Test Preparation Course</label>
            <select name="test_preparation_course" required>
                <option disabled selected value="">Select Course Status</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="form-group">
            <label>Reading Score (0 - 100)</label>
            <input type="number" name="reading_score" placeholder="Enter Reading Score" min="0" max="100" required>
        </div>

        <div class="form-group">
            <label>Writing Score (0 - 100)</label>
            <input type="number" name="writing_score" placeholder="Enter Writing Score" min="0" max="100" required>
        </div>

        <div class="form-group">
            <input type="submit" value="Predict Maths Score">
        </div>
    </form>

    {% if results %}
    <div class="prediction-result">
        🎯 Predicted Maths Score: <strong>{{ results }}</strong>
    </div>
    {% endif %}
</div>

</body>
</html>
